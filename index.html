<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leikskólagjald Reiknivél</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f9f9f9;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function CalculatorIcon({ className, style }) {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}>
          <rect width="16" height="20" x="4" y="2" rx="2" />
          <line x1="8" x2="16" y1="6" y2="6" />
          <line x1="16" x2="16" y1="14" y2="14" />
          <path d="M16 10h.01" /><path d="M12 10h.01" /><path d="M8 10h.01" />
          <path d="M12 14h.01" /><path d="M8 14h.01" />
          <path d="M12 18h.01" /><path d="M8 18h.01" />
        </svg>
      );
    }

    function KindergartenCalculator() {
      const [numChildren, setNumChildren] = useState(1);
      const [hours, setHours] = useState(4);
      const [subsidized, setSubsidized] = useState(false);
      const containerRef = useRef(null);

      const FOOD_FEE = 12165;
      const EXTRA_HOUR_RATE = 6903;
      const SUBSIDY_DISCOUNT = 0.25;

      const careFeeLookup = {
        4: 18308, 4.5: 20597, 5: 22885, 5.5: 25174, 6: 27462,
        6.5: 29751, 7: 32039, 7.5: 34328, 8: 36616
      };

      useEffect(() => {
        const sendHeight = () => {
          if (containerRef.current) {
            const height = containerRef.current.offsetHeight;
            window.parent.postMessage({ calcHeight: height + 80 }, '*');
          }
        };
        sendHeight();
        const timer = setTimeout(sendHeight, 500);
        window.addEventListener('resize', sendHeight);
        return () => {
          window.removeEventListener('resize', sendHeight);
          clearTimeout(timer);
        };
      }, [numChildren, hours, subsidized]);

      const calculateTotal = () => {
        let baseCareFee;
        if (hours <= 8) {
          baseCareFee = careFeeLookup[hours];
        } else {
          const extraHalfHour = Math.round(EXTRA_HOUR_RATE / 2);
          baseCareFee = careFeeLookup[8] + extraHalfHour;
        }

        let finalCareFee = baseCareFee;
        if (subsidized) {
          if (hours === 8.5) {
            finalCareFee = 30052;
          } else {
            finalCareFee = Math.ceil(baseCareFee * (1 - SUBSIDY_DISCOUNT));
          }
        }

        let results = [];
        let total = 0;
        for (let i = 0; i < numChildren; i++) {
          const multiplier = i === 0 ? 1.0 : (i === 1 ? 0.5 : 0.0);
          const childCare = Math.round(finalCareFee * multiplier);
          const childTotal = childCare + FOOD_FEE;

          results.push({
            childNum: i + 1,
            originalCareFee: finalCareFee,
            discount: Math.round(finalCareFee * (1 - multiplier)),
            careFee: childCare,
            foodFee: FOOD_FEE,
            total: childTotal
          });
          total += childTotal;
        }
        return { results, total };
      };

      const formatCurrency = (a) => new Intl.NumberFormat('is-IS').format(a) + ' kr.';
      const { results, total } = calculateTotal();

      return (
        <div ref={containerRef} className="p-2 sm:p-4 text-left w-full mb-[60px]">
          <div className="w-full max-w-2xl bg-white rounded-2xl p-4 sm:p-8 border border-gray-200 shadow-sm mx-auto sm:mx-0">
            <div className="flex items-center gap-3 mb-6 text-[#1D4D91]">
              <CalculatorIcon className="w-6 h-6 sm:w-8 sm:h-8" />
              <h1 className="text-xl sm:text-2xl font-bold text-gray-800 uppercase tracking-tight">Leikskólagjald Reiknivél</h1>
            </div>

            <div className="space-y-4">
              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-1">Fjöldi barna</label>
                <select value={numChildren} onChange={(e) => setNumChildren(Number(e.target.value))} className="w-full p-3 border-2 border-gray-100 rounded-lg bg-white text-base outline-none focus:border-[#1D4D91]">
                  {[1,2,3,4,5].map(n => <option key={n} value={n}>{n} {n === 1 ? 'barn' : 'börn'}</option>)}
                </select>
              </div>

              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-1">Klukkustundir á dag</label>
                <select value={hours} onChange={(e) => setHours(Number(e.target.value))} className="w-full p-3 border-2 border-gray-100 rounded-lg bg-white text-base outline-none focus:border-[#1D4D91]">
                  <option value={4}>4 klst.</option>
                  <option value={4.5}>4.5 klst.</option>
                  <option value={5}>5 klst.</option>
                  <option value={5.5}>5.5 klst.</option>
                  <option value={6}>6 klst.</option>
                  <option value={6.5}>6.5 klst.</option>
                  <option value={7}>7 klst.</option>
                  <option value={7.5}>7.5 klst.</option>
                  <option value={8}>8 klst.</option>
                  <option value={8.5}>8,5 klst.</option>
                </select>
              </div>

              <div className="bg-white border-2 border-gray-100 rounded-lg p-3">
                <div className="flex items-start gap-3">
                  <input type="checkbox" id="subsidized" checked={subsidized} onChange={(e) => setSubsidized(e.target.checked)} className="w-5 h-5 mt-0.5" style={{ accentColor: '#1D4D91' }} />
                  <div className="flex-1">
                    <label htmlFor="subsidized" className="text-sm font-semibold text-gray-900 cursor-pointer">Niðurgreitt dvalargjald</label>
                    <p className="mt-1 text-[11px] text-gray-600 leading-tight">Fyrir einstæða foreldra og námsmenn í fullu dagnámi.</p>
                  </div>
                </div>
              </div>
            </div>

            <div className="mt-8 pt-6 border-t border-gray-100">
              <h2 className="text-lg font-bold text-gray-800 mb-4 text-left">Niðurstöður</h2>
              <div className="space-y-3">
                {results.map((r) => (
                  <div key={r.childNum} className="bg-white border border-gray-100 rounded-lg p-3" style={{ borderLeft: '4px solid #1D4D91' }}>
                    <h3 className="text-sm font-semibold mb-2" style={{ color: '#1D4D91' }}>Barn {r.childNum}</h3>
                    <div className="space-y-1 text-xs sm:text-sm text-gray-700">
                      <div className="flex justify-between gap-2"><span>Dvalargjald:</span><span className="font-medium text-gray-900">{formatCurrency(r.originalCareFee)}</span></div>
                      {r.discount > 0 && <div className="flex justify-between gap-2 text-red-600"><span>Systkinaafsláttur:</span><span>-{formatCurrency(r.discount)}</span></div>}
                      <div className="flex justify-between gap-2"><span>Fæðisgjald:</span><span className="text-gray-900">{formatCurrency(r.foodFee)}</span></div>
                      <div className="flex justify-between gap-2 pt-1 border-t border-gray-50 font-bold mt-1 text-gray-900">
                        <span>Samtals:</span>
                        <span style={{ color: '#1D4D91' }}>{formatCurrency(r.total)}</span>
                      </div>
                    </div>
                  </div>
                ))}

                <div className="text-white rounded-lg p-4 mt-4" style={{ backgroundColor: '#1D4D91' }}>
                  <div className="flex flex-wrap justify-between items-center gap-2 text-white">
                    <span className="text-sm sm:text-base font-bold uppercase tracking-wide">Samtals á mánuði:</span>
                    <span className="text-lg sm:text-2xl font-extrabold">{formatCurrency(total)}</span>
                  </div>
                </div>
              </div>
            </div>

            <div className="mt-6 border border-gray-100 rounded-lg p-4 bg-gray-50/30">
              <h3 className="text-sm font-semibold text-gray-800 mb-3">Fæðisgjald skiptist á eftirfarandi hátt:</h3>
              <div className="space-y-1 text-xs text-gray-600">
                <div className="flex items-start gap-1">
                  <span className="font-medium text-gray-800">- Morgunhressing</span>
                  <span>3.075 kr. á mánuði</span>
                </div>
                <div className="flex items-start gap-1">
                  <span className="font-medium text-gray-800">- Hádegismatur</span>
                  <span>6.015 kr. á mánuði</span>
                </div>
                <div className="flex items-start gap-1">
                  <span className="font-medium text-gray-800">- Síðdegishressing</span>
                  <span>3.075 kr. á mánuði</span>
                </div>
              </div>
            </div>

            <div className="mt-8 text-[10px] text-gray-400 italic leading-relaxed border-t border-gray-100 pt-4 text-left">
              Eingöngu er um áætlun að ræða miðað við þær forsendur sem eru valdar og með fyrirvara um hugsanlegar villur.
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<KindergartenCalculator />);
  </script>
</body>
</html>
